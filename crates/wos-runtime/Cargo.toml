[package]
name = "wos-runtime"
version = "0.1.0"
edition = "2024"
description = "Generic runtime orchestration for WOS processors"
license = "AGPL-3.0"
repository = "https://github.com/formspec/formspec"

[dependencies]
base64 = "0.22"
fel-core = { path = "../../../crates/fel-core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
semver = "1"
thiserror = "2"
time = { version = "0.3", features = ["formatting", "parsing"] }
wos-core = { path = "../wos-core" }
