[workspace]
members = [
    "crates/wos-core",
    "crates/wos-lint",
    "crates/wos-conformance",
    "crates/wos-runtime",
    "crates/wos-formspec-binding",
    "crates/wos-export",
    "crates/wos-synth",
    "crates/wos-server",
    "crates/wos-synth-spike",
    "crates/wos-synth-core",
    "crates/wos-synth-mock",
    "crates/wos-synth-anthropic",
    "crates/wos-synth-cli",
    "crates/wos-authoring",
    "crates/wos-mcp"
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/formspec/formspec"

# fel-core lives in the Formspec monorepo (`../crates/fel-core` when this tree is `formspec/wos-spec`).
[workspace.dependencies]
fel-core = { path = "../crates/fel-core" }
